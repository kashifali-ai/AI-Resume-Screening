<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — JobFit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 text-slate-800
             flex items-center justify-center p-4">
  <main class="w-full max-w-sm">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-slate-900">Job<span class="text-indigo-600">Fit</span></h1>
      <p class="text-slate-500 mt-1 text-sm">Sign in to screen resumes against any job description.</p>
    </div>

    <form id="loginForm" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required
          class="w-full rounded-xl border border-slate-200 p-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="you@example.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required
          class="w-full rounded-xl border border-slate-200 p-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="••••••••" />
      </div>

      <button id="submitBtn" type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl
               transition disabled:opacity-50 disabled:cursor-not-allowed">
        Sign in
      </button>

      <p id="error" class="hidden text-sm text-rose-600 text-center"></p>
    </form>

    <div class="mt-4 text-center text-xs text-slate-500">
      Demo account: <span class="font-mono">admin@test.com</span> /
      <span class="font-mono">admin123</span>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const form = $("loginForm"), errorEl = $("error"), submitBtn = $("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.add("hidden");
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";
      try {
        const fd = new FormData();
        fd.append("email", $("email").value.trim());
        fd.append("password", $("password").value);
        const res = await fetch("/api/auth/login", { method: "POST", body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "Login failed.");
        window.location.href = "/";   // -> JobFit dashboard
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
